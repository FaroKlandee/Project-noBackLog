<!doctype html>
<!-- 
  The DOCTYPE declaration tells the browser this is an HTML5 document.
  It must appear as the very first line — before the <html> tag — so that
  browsers render the page in "standards mode" rather than "quirks mode".
-->

<html lang="en">
  <!--
    The root element of the page.
    The `lang="en"` attribute declares the primary language of the document as
    English. This is important for screen readers, search engines, and browser
    spell-check behaviour.
  -->

  <head>
    <!--
      The <head> contains machine-readable metadata and resource links.
      Nothing inside <head> is rendered visually on the page.
    -->

    <!-- 
      Declares the character encoding for this document as UTF-8.
      UTF-8 covers virtually every character and symbol in the world, preventing
      garbled text. This tag must appear early in <head> so that the browser
      reads subsequent content with the correct encoding.
    -->
    <meta charset="UTF-8" />

    <!--
      The viewport meta tag controls how the page is scaled and sized on
      mobile/tablet devices.
        - `width=device-width`  → sets the viewport width to the physical screen
                                  width, preventing the browser from faking a
                                  wide desktop viewport on small screens.
        - `initial-scale=1.0`  → sets the initial zoom level to 100% (no zoom)
                                  when the page first loads.
      Without this tag, mobile browsers would zoom out to show a shrunken
      desktop layout, breaking any responsive design.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Sets the text shown in the browser tab, bookmarks, and search-engine
      results. "frontend" is the placeholder title generated by Vite; it should
      be replaced with a user-facing name such as "NoBacklog" when the app is
      closer to production.
    -->
    <title>frontend</title>
  </head>

  <body>
    <!--
      The <body> contains everything that is rendered visually in the browser
      window.
    -->

    <!--
      The React mount point.
      This empty <div> with id="root" is the single DOM node that React takes
      ownership of at runtime. When main.jsx calls `ReactDOM.createRoot(root)`,
      React replaces this element's content with the full component tree.
      All of the app's UI ultimately lives inside this div after JavaScript runs.
    -->
    <div id="root"></div>

    <!--
      The application entry-point script.
        - `type="module"` enables native ES Module semantics (import/export),
          which is required for Vite's dev server and production bundling.
          It also implicitly defers execution until the DOM is parsed, so the
          #root div above is guaranteed to exist when the script runs.
        - `src="/src/app/main.jsx"` points to the React bootstrap file.
          During development, Vite serves this file directly with HMR (Hot
          Module Replacement). During a production build (`vite build`), Vite
          replaces this path with a hashed, optimised bundle URL automatically.
    -->
    <script type="module" src="/src/app/main.jsx"></script>
  </body>
</html>
